<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            padding: 0;
        }

        .header {
            text-align: center;
            padding: 10px;
            font-size: 25px;
            margin: 5px 20px;
            border: 2px solid black;
        }
        
        .row {
            display: flex;
            padding: 10px;
            height: 10vh;
        }
        
        .cell {
            flex: 1;
            border: 2px solid black;
            margin: 10px;
            padding: 10px;
        }
        
        .cell-title {
            text-align: center;
            font-weight: bold;
            padding: 5px;
        } 
        
        /* Скрываем чекбокс */
        #burger {
            display: none;
        }

        /* Бургер-иконка */
        [for="burger"] {
            display: none;
            position: absolute;
            top: 10px;
            right: 40px;
            font-size: 40px;
            cursor: pointer;
            z-index: 100;
        }

        /* Стиль для меню */
        nav {
            margin: 0 20px;
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            padding: 0;
            margin: 0;
            overflow: hidden;    
        }
        nav ul li{
            border: 2px solid black;
            margin: 0px 20px;
        }
        nav a {
            display: block;
            padding: 10px 15px;
            text-decoration: none;
            font-weight: bold;
            color: black;
        }
        
        /* Стиль бургер-иконки */
        [for="burger"]::before {
            content: "\2630"; /* Бургер-меню (три горизонтальные линии) */
        }

        #burger:checked + [for="burger"]::before {
            content: "\2715"; /* Крестик (закрыть) */
        }

        /* Мобильная версия */
        @media (max-width: 600px) {
            [for="burger"] {
                display: block;
            }

            nav {
                display: none; /* Скрыто по умолчанию */
            }

            #burger:checked ~ nav {
                display: block; /* Показывается при клике на бургер */
            }

            nav ul {
                flex-direction: column;
                border-radius: 0;
            }
            
            nav ul li {
                margin: 5px 0px;
            }
            
            nav a {
                text-align: center;
            }

            /* Вертикальное расположение блоков в мобильной версии */
            .row {
                flex-direction: column;
                height: auto;
            }
            
            .cell {
                margin: 5px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="checkbox" id="burger">
        <label for="burger"></label>
        <div class="header">Flexbox-верстка</div>
        <nav>
            <ul>
                <li><a href="G:\1 сем кяр\9 лаба\index1.html">Задание 1.1</a></li>
                <li><a href="G:\1 сем кяр\9 лаба\index2.html">Задание 1.2</a></li>
                <li><a href="G:\1 сем кяр\9 лаба\third1.html">Задание 3.1</a></li>
                <li><a href="G:\1 сем кяр\9 лаба\third2.html">Задание 3.2</a></li>
            </ul>
        </nav>

        <div class="row">
            <div class="cell">
                <div class="cell-title">Видео</div>
            </div>
            <div class="cell">
                <div class="cell-title">Теория</div>
            </div>
            <div class="cell">
                <div class="cell-title">Аудио</div>   
            </div>
        </div>
    </div>
</body>
</html>
