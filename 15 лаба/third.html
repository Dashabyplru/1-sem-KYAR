<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Данные студента</title>
    <style>
        body {
            font-family: Times New Roman, serif;
        }
        .form-container {
            width: 470px;
            padding: 20px;
            border: 1px solid #ccc;
            margin-left: 30%;
        }
        .form-title {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .form-row {
            margin-bottom: 14px;
            display: flex;
            align-items: center;
        }
        .form-row label {
            width: 170px;
            font-size: 1.1em;
        }
        .form-row input[type="text"],
        .form-row input[type="email"] {
            width: 220px;
            padding: 4px 6px;
            font-size: 1em;
            border: 1px solid #aaa;
            border-radius: 2px;
        }
        .form-row input[placeholder] {
            color: #999;
        }
        .form-row.social-row {
            margin-bottom: 16px;
            align-items: flex-start;
        }
        .form-row .social-label {
            vertical-align: middle;
            margin-right: 6px;
        }
        .form-row .social-options label {
            font-size: 1em;
            margin-right: 15px;
        }
        .submit-row {
            margin-left: 0;
        }
        input[type="submit"] {
            padding: 4px 18px;
            font-size: 1em;
            border-radius: 2px;
            border: 1px solid #aaa;
            background: #e1e1e1;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-title">Данные студента</div>
        <form>
            <div class="form-row">
                <label for="name">Имя студента</label>
                <input type="text" id="name" name="name" placeholder="обязательно заполнить" required>
            </div>
            <div class="form-row">
                <label for="middle">Отчество студента</label>
                <input type="text" id="middle" name="middle" placeholder="обязательно заполнить" required>
            </div>
            <div class="form-row">
                <label for="surname">Фамилия студента</label>
                <input type="text" id="surname" name="surname" placeholder="обязательно заполнить" required>
            </div>
            <div class="form-row">
                <label for="email">Адрес почты</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-row">
                <label for="phone">Контактный номер</label>
                <input type="text" id="phone" name="phone">
            </div>
            <div class="form-row social-row">
                <label class="social-label">Какую социальную сеть вы используете?</label>
                <div class="social-options">
                    <label>
                        <input type="checkbox" name="social_vk"> VK
                    </label>
                    <label>
                        <input type="checkbox" name="social_fb"> Facebook
                    </label>
                    <label>
                        <input type="checkbox" name="social_inst"> Instagram
                    </label>
                </div>
            </div>
            <div class="form-row submit-row">
                <input type="submit" value="отправить">
            </div>
        </form>
    </div>
</body>
</html>
