<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border-box vs Content-box</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            padding: 20px;
        }
        .box {
            width: 150px;
            height: 150px;
            padding: 20px;
            border: 10px solid #333;
            background-color: #e0e0e0;
            margin: 20px auto;
            font-size: 24px;
            font-weight: bold;
            line-height: 110px;
            display: inline-block;
        }
        .border-box {
            box-sizing: border-box;
        }
        .content-box {
            box-sizing: content-box;
            width: 90px;
            height: 90px;
            line-height: 50px;
        }
        .label {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="label">border-box</div>
    <div class="box border-box">1</div>
    
    <div class="label">content-box</div>
    <div class="box content-box">2</div>
</body>
</html>
