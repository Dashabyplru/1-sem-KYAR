<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Шахматная доска</title>
  <style>
    table {
      border-collapse: collapse;
      margin: 20px auto;
      font-family: Arial, sans-serif;
      font-size: 20px;
      text-align: center;
    }
    table td {
      width: 40px;
      height: 40px;
      border: 1px solid #222;
      padding: 0;
      background: white;
    }
    table tr:nth-child(odd) td:nth-child(odd),
    table tr:nth-child(even) td:nth-child(even){
      background: saddlebrown;
    }
    table tr:nth-child(odd) td:nth-child(even),
    table tr:nth-child(even) td:nth-child(odd){
      background: white;
    }
    
    /* Нумерация и буквы */
    table tr:first-child td:nth-child(odd),
    table tr:first-child td:nth-child(even),
    table tr:last-child td:nth-child(odd),
    table tr:last-child td:nth-child(even){
      font-weight: normal;
      background: sandybrown;
      height: 20px;
    }
    table tr:nth-child(even) td:last-child,
    table tr:nth-child(odd) td:last-child,
    table tr:nth-child(even) td:first-child,
    table tr:nth-child(odd) td:first-child{
      font-weight: normal;
      background: sandybrown;
      width: 20px;
    }
    table tr:first-child td:first-child,
    table tr:first-child td:last-child,
    table tr:last-child td:first-child,
    table tr:last-child td:last-child {
      background: #fff;
      border: none;
    }
    /* Стили для подписей */
    .caption {
      text-align: center;
      font-size: 16px;
      margin-top: 10px;
      font-family: Times New Roman, serif;
    }
  </style>
</head>
