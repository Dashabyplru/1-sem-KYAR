<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация постоянного клиента</title>
  <style>
    .form-container {
      background: indigo;
      max-width: 400px;
      margin: 30px auto;
      padding: 20px 24px 18px 24px;
      border-radius: 7px;
      box-sizing: border-box;
      color: #fff;
      box-shadow: 0 0 18px #2225;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 1.3em;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 2px solid #fff;
      padding-bottom: 8px;
    }
    form {
      width: 100%;
    }
    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 11px;
    }
    label {
      min-width: 120px;
      text-align: left;
      font-size: 1.07em;
      flex-shrink: 0;
      margin-right: 6px;
    }
    /* Стили для текстовых полей и email */
    input[type="text"],
    input[type="number"],
    input[type="email"],
    input[type="date"] {
      width: 100%;
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      border-radius: 3px;
      background: rgba(255, 255, 255, .5);
      color: rgba(255,255,255, 1);
      box-shadow: inset 0 0 10px rgba(255,255,255,.75);
      transition: background 0.15s, color 0.15s;
      outline: none;
    }
    /* При фокусе — ТОЛЬКО не email! */
    input[type="text"]:focus,
    input[type="text"]:active,
    input[type="number"]:focus,
    input[type="number"]:active {
      background: #fff;
      color: #111;
    }
    /* Кнопки */
    button, input[type="submit"], input[type="reset"] {
      background: navy;
      color: #fff;
      font-size: 1.1em;
      border: none;
      border-radius: 3px;
      padding: 6px 18px 6px 18px;
      margin-right: 10px;
      margin-top: 15px;
      box-shadow: 0 0 4px #fff;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    button:last-child, 
    input[type="submit"]:last-child, 
    input[type="reset"]:last-child {margin-right:0;}
    /* Селект и дата оформления */
    select, input[type="date"] {
      font-size: 0.92em;
      border-radius: 3px;
      border: none;
      padding: 5px 10px;
      width: 100%;
    }
    
  </style>
</head>
<body>
<div class="form-container">
  <h2>Регистрация постоянного клиента</h2>
  <form autocomplete="off">
    <p class="form-row">
      <label for="surname">Фамилия:</label>
      <input type="text" id="surname" name="surname" required>
    </p>
    <p class="form-row">
      <label for="name">Имя:</label>
      <input type="text" id="name" name="name" required>
    </p>
    <p class="form-row">
      <label for="patronymic">Отчество:</label>
      <input type="text" id="patronymic" name="patronymic">
    </p>
    <p class="form-row">
      <label for="age">Ваш возраст:</label>
      <input type="number" id="age" name="age" min="0" max="120">
    </p>
    <p class="form-row">
      <span class="label">Пол:<span>
        <label style="margin-left: 90px;"><input type="checkbox">Мужской</label>
        <label><input type="checkbox">Женский</label>
    </p>
    <p class="form-row">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email">
    </p>
    <p class="form-row">
      <label for="country">Страна проживания:</label>
      <input type="text" id="country" name="country">
    </p>
    <p class="form-row">
      <label for="source">Откуда вы узнали о нас?</label>
      <select id="source" name="source">
        <option>Выберите вариант</option>
        <option>Реклама</option>
        <option>Интернет</option>
        <option>Друзья</option>
        <option>Другое</option>
      </select>
    </p>
    <p class="form-row">
      <label for="date">Дата заполнения</label>      
      <input type="date" id="date" name="date">
    </p>
    <p class="form-row" style="justify-content:center; margin-top:10px;">
      <input type="submit" value="Регистрация">
      <input type="reset" value="Отмена">
    </p>
  </form>
</div>
</body>
</html>
